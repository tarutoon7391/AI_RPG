<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>AI_RPG</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#0f1923" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>AI_RPG</h1>
      <p id="status-text" aria-live="polite">未ログイン</p>
    </header>

    <main id="main-content">
      <section id="auth-panel" class="panel">
        <h2>ログイン</h2>
        <label>ユーザー名<input id="auth-username" type="text" maxlength="32" autocomplete="username" /></label>
        <label>パスワード<input id="auth-password" type="password" maxlength="128" autocomplete="current-password" /></label>
        <div class="auth-actions">
          <button id="login-btn" type="button">ログイン</button>
        </div>
        <p id="auth-error" class="error-text"></p>
      </section>

      <section id="home-view" class="hidden">
        <div class="home-actions">
          <button id="logout-btn" type="button" class="secondary">ログアウト</button>
        </div>
        <div id="character-view" class="panel hidden">
          <div class="character-top-row">
            <div class="character-name-line">名前：<span id="char-name">---</span></div>
            <div class="character-job-line">
              職業：<span id="char-job">---</span>
              <button id="job-change-btn" type="button" class="small-btn">転職</button>
            </div>
          </div>
          <div class="character-info-line">レベル：<span id="char-level">1</span>（次のレベルまで：<span id="char-next-exp">0</span>EXP）</div>
          <div class="character-info-line">所持金：<span id="char-gold">0</span>G</div>

          <h3 class="character-section-title">基本ステータス</h3>
          <div class="character-stats-grid">
            <div>HP: <span id="char-hp">0</span>/<span id="char-max-hp">0</span></div>
            <div>MP: <span id="char-mp">0</span>/<span id="char-max-mp">0</span></div>
            <div>攻撃力: <span id="char-atk">0</span></div>
            <div>防御力: <span id="char-def">0</span></div>
            <div>回復力: <span id="char-rec">0</span></div>
            <div>素早さ: <span id="char-spd">0</span></div>
            <div>会心率: <span id="char-crit">0</span>%</div>
            <div>回避率: <span id="char-eva">0</span>%</div>
            <div>魅力度: <span id="char-charm">0</span></div>
          </div>

          <h3 class="character-section-title">装備</h3>
          <div class="character-equip-list">
            <button type="button" class="equip-slot-btn" data-slot="head">
              <span>頭：<span id="equip-head-name">未装備</span></span>
              <span id="equip-head-effect" class="equip-effect">-</span>
            </button>
            <button type="button" class="equip-slot-btn" data-slot="body">
              <span>体：<span id="equip-body-name">未装備</span></span>
              <span id="equip-body-effect" class="equip-effect">-</span>
            </button>
            <button type="button" class="equip-slot-btn" data-slot="legs">
              <span>足：<span id="equip-legs-name">未装備</span></span>
              <span id="equip-legs-effect" class="equip-effect">-</span>
            </button>
            <button type="button" class="equip-slot-btn" data-slot="shoes">
              <span>靴：<span id="equip-shoes-name">未装備</span></span>
              <span id="equip-shoes-effect" class="equip-effect">-</span>
            </button>
            <button type="button" class="equip-slot-btn" data-slot="accessory">
              <span>アクセサリー：<span id="equip-accessory-name">未装備</span></span>
              <span id="equip-accessory-effect" class="equip-effect">-</span>
            </button>
          </div>
        </div>
        <div id="dungeon-list" class="panel hidden">
          <h2>ダンジョン一覧</h2>
          <button id="main-dungeon-category-btn" class="dungeon-btn" type="button">メインダンジョン</button>
          <button class="dungeon-btn ghost not-implemented" type="button" data-kind="エクストラダンジョン">エクストラダンジョン</button>
          <button class="dungeon-btn ghost not-implemented" type="button" data-kind="イベントダンジョン">イベントダンジョン</button>
          <button class="dungeon-btn ghost not-implemented" type="button" data-kind="デイリーダンジョン">デイリーダンジョン</button>
        </div>
        <div id="main-dungeon-list" class="panel hidden">
          <h2>メインダンジョン一覧</h2>
          <button id="main-dungeon-btn" class="dungeon-btn" type="button">
            はじまりの草原（推奨Lv1）
          </button>
          <button id="back-to-dungeon-list-btn" class="dungeon-btn ghost" type="button">戻る</button>
        </div>
        <div id="placeholder-view" class="panel">
          <h2 id="placeholder-title">冒険</h2>
          <p id="placeholder-message">冒険タブを押すとダンジョン一覧を表示します。</p>
        </div>
      </section>

      <section id="battle-view" class="hidden">
        <div class="battle-layout">
          <div class="enemy-area">
            <div id="enemy-name" class="enemy-name">---</div>
            <div class="enemy-visual" id="enemy-visual">ENEMY</div>
            <div class="bar-wrap">
              <div class="bar-label" id="enemy-hp-text">HP ---/---</div>
              <div class="bar-bg"><div id="enemy-hp-bar" class="bar hp"></div></div>
            </div>
          </div>

          <div class="player-area">
            <div id="player-name">---</div>
            <div class="bar-wrap">
              <div class="bar-label" id="player-hp-text">HP ---/---</div>
              <div class="bar-bg"><div id="player-hp-bar" class="bar hp"></div></div>
            </div>
            <div class="bar-wrap">
              <div class="bar-label" id="player-mp-text">MP ---/---</div>
              <div class="bar-bg"><div id="player-mp-bar" class="bar mp"></div></div>
            </div>
          </div>

          <div class="command-area">
            <button class="cmd-btn" data-command="attack" type="button">⚔️ 攻撃</button>
            <button class="cmd-btn" data-command="skill" type="button">✨ スキル</button>
            <button class="cmd-btn" data-command="capture" type="button">🤝 仲間に</button>
            <button class="cmd-btn" data-command="escape" type="button">🏃 逃げる</button>
          </div>
        </div>

        <div class="battle-log" id="battle-log"></div>
        <button id="back-to-home-btn" class="back-home-btn" type="button">冒険へ戻る</button>
      </section>
    </main>

    <nav id="tab-bar" class="tab-bar hidden" aria-label="メインメニュー">
      <button class="tab-button active" data-tab="adventure" type="button">冒険</button>
      <button class="tab-button" data-tab="monsters" type="button">キャラ・モンスター</button>
      <button class="tab-button" data-tab="versus" type="button">対戦</button>
      <button class="tab-button" data-tab="others" type="button">その他</button>
    </nav>
  </div>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content">
      <p id="modal-message">未実装です</p>
      <button id="modal-close" type="button">閉じる</button>
    </div>
  </div>

  <div id="skill-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content">
      <p>スキルを選択してください</p>
      <div id="skill-list" class="skill-list"></div>
      <button id="skill-cancel" type="button" class="secondary">キャンセル</button>
    </div>
  </div>

  <div id="mini-popup" class="mini-popup hidden" role="menu" aria-hidden="true"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/main.js"></script>
</body>
</html>
