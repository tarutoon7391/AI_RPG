<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>AI_RPG ログイン</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <meta name="theme-color" content="#0f1923" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>AI_RPG</h1>
      <p>ログインしてください</p>
    </header>

    <main id="main-content">
      <section class="panel">
        <h2>ログイン</h2>
        <label>ユーザー名<input id="auth-username" type="text" maxlength="32" autocomplete="username" /></label>
        <label>パスワード<input id="auth-password" type="password" maxlength="128" autocomplete="current-password" /></label>
        <div class="auth-actions">
          <button id="login-btn" type="button">ログイン</button>
          <button id="register-btn" type="button">新規登録はこちら</button>
        </div>
        <p id="auth-error" class="error-text"></p>
      </section>
    </main>
  </div>

  <script src="/login.js"></script>
</body>
</html>
